---
# Allow ingress from the ingress controller (assuming it runs in ingress-nginx namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-apps
  namespace: voting-app
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - vote
          - result
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80
          protocol: TCP
