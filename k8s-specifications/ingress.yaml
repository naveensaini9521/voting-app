apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress
  namespace: voting-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/websocket-services: result
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - votingapp.local
  #     secretName: votingapp-tls
  rules:
    - host: votingapp.local
      http:
        paths:
          - path: /result
            pathType: Prefix
            backend:
              service:
                name: result
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vote
                port:
                  number: 80
