apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: voting-app
type: Opaque
stringData:
  POSTGRES_HOST: "db.voting-app.svc.cluster.local"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_DB: "postgres"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: voting-app
type: Opaque
stringData:
  REDIS_HOST: "redis.voting-app.svc.cluster.local"
  REDIS_PORT: "6379"
---
